<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমির হিসাব ব্যবস্থাপনা</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase CDN (v9 Compat for single file usage) -->
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts (Bengali) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        /* Colorful Dot Wheel Spinner */
        .dot-spinner {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .dot-spinner div {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 0;
            left: 0;
            transform-origin: 40px 40px;
            animation: dot-spin 1.2s linear infinite;
        }
        @keyframes dot-spin {
            0% { transform: rotate(0deg) translate(32px, 0); }
            100% { transform: rotate(360deg) translate(32px, 0); }
        }
        
        /* Button Spinner */
        .btn-spinner {
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: btn-spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // এখানে আপনার Firebase এর Config তথ্য বসান
        // ==========================================
        const firebaseConfig = {
           apiKey: "AIzaSyCJd1-9NNhmI4rumaanY8A1VF4wLvg4pkg",
  authDomain: "crop-management-116fe.firebaseapp.com",
  projectId: "crop-management-116fe",
  storageBucket: "crop-management-116fe.firebasestorage.app",
  messagingSenderId: "1040293009053",
  appId: "1:1040293009053:web:7b68b487297b534048a674",
  measurementId: "G-SS3FBXZHET"
        };

        // Firebase Initialize
        let auth, db;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (error) {
            console.error("Firebase Config Error. Please update your config.", error);
        }

        // ==========================================
        // 2. COLORFUL SPINNER COMPONENT
        // ==========================================
        const ColorfulSpinner = () => {
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F033FF', '#FF33A1', '#33FFF5', '#FFBD33', '#A133FF'];
            return (
                <div className="flex flex-col justify-center items-center h-screen bg-gray-50">
                    <div className="dot-spinner">
                        {colors.map((color, i) => (
                            <div key={i} style={{backgroundColor: color, animationDelay: `${i * 0.1}s`}}></div>
                        ))}
                    </div>
                    <p className="mt-4 text-gray-600 font-semibold">লোড হচ্ছে...</p>
                </div>
            );
        };

        // ==========================================
        // 3. AUTHENTICATION COMPONENTS
        // ==========================================
        
        // Login Component
        const Login = ({ setUser }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("ভুল ইমেইল বা পাসওয়ার্ড!");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 to-purple-600 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
                        <h2 className="text-3xl font-bold text-center text-gray-800 mb-6">লগ ইন করুন</h2>
                        {error && <div className="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">{error}</div>}
                        <form onSubmit={handleLogin}>
                            <div className="mb-4">
                                <label className="block text-gray-700 mb-2">ইমেইল</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div className="mb-6">
                                <label className="block text-gray-700 mb-2">পাসওয়ার্ড</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-bold flex justify-center items-center ${loading ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'লগ ইন'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // Signup Component
        const Signup = ({ setUser }) => {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [mobile, setMobile] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [usernameStatus, setUsernameStatus] = useState({msg: '', color: ''});
            const [suggestedUsername, setSuggestedUsername] = useState('');

            // Username availability check
            useEffect(() => {
                if(username.length > 2) {
                    const timer = setTimeout(async () => {
                        const snapshot = await db.collection('users').where('username', '==', username).get();
                        if(!snapshot.empty) {
                            setUsernameStatus({msg: 'Already exists', color: 'red'});
                            setSuggestedUsername(username + Math.floor(Math.random() * 100));
                        } else {
                            setUsernameStatus({msg: 'Available', color: 'green'});
                            setSuggestedUsername('');
                        }
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [username]);

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    // Check email & username uniqueness
                    const uSnapshot = await db.collection('users').where('username', '==', username).get();
                    const eSnapshot = await db.collection('users').where('email', '==', email).get();
                    
                    if(!uSnapshot.empty || !eSnapshot.empty) {
                        throw new Error("ইউজারনেম বা ইমেইল আগে ব্যবহার করা হয়েছে (Already exists)!");
                    }

                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(userCredential.user.uid).set({
                        username, email, mobile, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-500 to-teal-600 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
                        <h2 className="text-3xl font-bold text-center text-gray-800 mb-6">সাইন আপ করুন</h2>
                        {error && <div className="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">{error}</div>}
                        <form onSubmit={handleSignup}>
                            <div className="mb-4">
                                <label className="block text-gray-700 mb-2">ইউজারনেম</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
                                {usernameStatus.msg && <p className={`text-sm mt-1 text-${usernameStatus.color}-500`}>{usernameStatus.msg}</p>}
                                {suggestedUsername && <p className="text-sm mt-1 text-gray-500 cursor-pointer hover:underline" onClick={() => setUsername(suggestedUsername)}>সাজেশন: {suggestedUsername}</p>}
                            </div>
                            <div className="mb-4">
                                <label className="block text-gray-700 mb-2">ইমেইল</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
                            </div>
                            <div className="mb-4">
                                <label className="block text-gray-700 mb-2">মোবাইল নম্বর</label>
                                <input type="tel" value={mobile} onChange={(e) => setMobile(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
                            </div>
                            <div className="mb-6">
                                <label className="block text-gray-700 mb-2">পাসওয়ার্ড</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
                            </div>
                            <button type="submit" disabled={loading || usernameStatus.msg === 'Already exists'} className={`w-full py-3 rounded-lg text-white font-bold flex justify-center items-center ${loading || usernameStatus.msg === 'Already exists' ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'সাইন আপ'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. DASHBOARD & FARMER MANAGEMENT
        // ==========================================
        const Dashboard = ({ user, loading, handleLogout }) => {
            const [farmers, setFarmers] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            
            // Add Farmer States
            const [name, setName] = useState('মোস্ত');
            const [landAmount, setLandAmount] = useState(33);
            const [startMonth, setStartMonth] = useState('জানুয়ারি');
            const [startYear, setStartYear] = useState(2026);
            const [rate, setRate] = useState(18000);
            const [advance, setAdvance] = useState(10000); // Advance payment

            useEffect(() => {
                if(user) {
                    const unsubscribe = db.collection('farmers').where('ownerId', '==', user.uid).onSnapshot(snapshot => {
                        const farmersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setFarmers(farmersData);
                    });
                    return () => unsubscribe();
                }
            }, [user]);

            const addFarmer = async (e) => {
                e.preventDefault();
                const total = landAmount * rate;
                const newFarmer = {
                    ownerId: user.uid,
                    name, landAmount, startMonth, startYear,
                    records: [{ 
                        year: startYear, 
                        rate: rate, 
                        total: total, 
                        paid: Number(advance), 
                        remaining: total - Number(advance) 
                    }]
                };
                await db.collection('farmers').add(newFarmer);
                setShowAddForm(false);
                // Reset form...
            };

            const addNewYear = async (farmerId, records, landAmount) => {
                const lastRecord = records[records.length - 1];
                const newYear = lastRecord.year + 1;
                const newRate = prompt(` ${newYear} সালের নতুন দর (প্রতি শতাংশ) কত?`, lastRecord.rate);
                if(newRate) {
                    const total = landAmount * Number(newRate);
                    const newRecords = [...records, { year: newYear, rate: Number(newRate), total, paid: 0, remaining: total }];
                    await db.collection('farmers').doc(farmerId).update({ records: newRecords });
                }
            };

            const handlePayment = async (farmerId, records, amount) => {
                let remainingPayment = Number(amount);
                const newRecords = records.map(r => ({...r})).sort((a,b) => a.year - b.year);
                
                for(let rec of newRecords) {
                    if(remainingPayment <= 0) break;
                    if(rec.remaining > 0) {
                        const pay = Math.min(remainingPayment, rec.remaining);
                        rec.paid += pay;
                        rec.remaining -= pay;
                        remainingPayment -= pay;
                    }
                }
                await db.collection('farmers').doc(farmerId).update({ records: newRecords });
            };

            if(loading) return <ColorfulSpinner />;

            return (
                <div className="min-h-screen bg-gray-100">
                    <nav className="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
                        <h1 className="text-xl font-bold">ড্যাশবোর্ড</h1>
                        <button onClick={handleLogout} className="bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-semibold">লগ আউট</button>
                    </nav>

                    <div className="container mx-auto p-4">
                        <button onClick={() => setShowAddForm(!showAddForm)} className="bg-green-600 text-white px-4 py-2 rounded mb-4 hover:bg-green-700">
                            {showAddForm ? "বাতিল করুন" : "নতুন চাষী যোগ করুন"}
                        </button>

                        {showAddForm && (
                            <form onSubmit={addFarmer} className="bg-white p-4 rounded shadow-md mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block mb-1">চাষীর নাম</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded" required />
                                </div>
                                <div>
                                    <label className="block mb-1">জমির পরিমাণ (শতাংশ)</label>
                                    <input type="number" value={landAmount} onChange={e => setLandAmount(e.target.value)} className="w-full p-2 border rounded" required />
                                </div>
                                <div>
                                    <label className="block mb-1">চাষ শুরুর মাস</label>
                                    <select value={startMonth} onChange={e => setStartMonth(e.target.value)} className="w-full p-2 border rounded">
                                        <option>জানুয়ারি</option>
                                        <option>জ্যৈষ্ঠ</option>
                                        <option>ফেব্রুয়ারি</option>
                                        <option>বৈশাখ</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block mb-1">চাষ শুরুর সাল</label>
                                    <input type="number" value={startYear} onChange={e => setStartYear(e.target.value)} className="w-full p-2 border rounded" required />
                                </div>
                                <div>
                                    <label className="block mb-1">দর (প্রতি শতাংশ)</label>
                                    <input type="number" value={rate} onChange={e => setRate(e.target.value)} className="w-full p-2 border rounded" required />
                                </div>
                                <div>
                                    <label className="block mb-1">অগ্রিম জমা</label>
                                    <input type="number" value={advance} onChange={e => setAdvance(e.target.value)} className="w-full p-2 border rounded" required />
                                </div>
                                <div className="md:col-span-3">
                                    <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">সেভ করুন</button>
                                </div>
                            </form>
                        )}

                        {/* Farmers Table/List */}
                        <div className="bg-white rounded shadow-md overflow-x-auto">
                            <table className="min-w-full text-center border-collapse">
                                <thead>
                                    <tr className="bg-blue-50 border-b">
                                        <th className="p-3 border">চাষীর নাম</th>
                                        <th className="p-3 border">জমি (শতাংশ)</th>
                                        <th className="p-3 border">সাল</th>
                                        <th className="p-3 border">দর</th>
                                        <th className="p-3 border">মোট</th>
                                        <th className="p-3 border">জমা</th>
                                        <th className="p-3 border text-red-600">বকেয়া</th>
                                        <th className="p-3 border">নতুন জমা / নতুন সাল</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {farmers.map(farmer => (
                                        <FarmerRow key={farmer.id} farmer={farmer} handlePayment={handlePayment} addNewYear={addNewYear} />
                                    ))}
                                </tbody>
                            </table>
                            {farmers.length === 0 && <p className="p-4 text-gray-500 text-center">কোন চাষী যোগ করা হয়নি।</p>}
                        </div>
                    </div>
                </div>
            );
        };

        // Farmer Row Component
        const FarmerRow = ({ farmer, handlePayment, addNewYear }) => {
            const [payAmount, setPayAmount] = useState('');
            return (
                <>
                    {farmer.records.map((rec, index) => (
                        <tr key={index} className="border-b hover:bg-gray-50">
                            <td className="p-3 border">{index === 0 ? farmer.name : ''}</td>
                            <td className="p-3 border">{index === 0 ? farmer.landAmount : ''}</td>
                            <td className="p-3 border">{rec.year}</td>
                            <td className="p-3 border">{rec.rate} ৳</td>
                            <td className="p-3 border">{rec.total} ৳</td>
                            <td className="p-3 border text-green-600">{rec.paid} ৳</td>
                            <td className="p-3 border text-red-600 font-bold">{rec.remaining} ৳</td>
                            <td className="p-3 border">
                                {index === farmer.records.length - 1 ? (
                                    <div className="flex flex-col space-y-2">
                                        <div className="flex justify-center">
                                            <input type="number" value={payAmount} onChange={e => setPayAmount(e.target.value)} placeholder="টাকা" className="border p-1 w-24 rounded text-center" />
                                            <button onClick={() => { handlePayment(farmer.id, farmer.records, payAmount); setPayAmount(''); }} className="ml-2 bg-blue-500 text-white px-2 py-1 rounded text-sm">জমা</button>
                                        </div>
                                        <button onClick={() => addNewYear(farmer.id, farmer.records, farmer.landAmount)} className="bg-purple-500 text-white px-2 py-1 rounded text-sm">
                                            {rec.year + 1} সালের হিসাব যোগ করুন
                                        </button>
                                    </div>
                                ) : '—'}
                            </td>
                        </tr>
                    ))}
                </>
            );
        };

        // ==========================================
        // 5. MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showSignup, setShowSignup] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(user => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                setUser(null);
                window.location.reload(); // Refreshes to login page
            };

            if (loading) return <ColorfulSpinner />;

            if (user) return <Dashboard user={user} loading={loading} handleLogout={handleLogout} />;

            return (
                <div>
                    {showSignup ? <Signup setUser={setUser} /> : <Login setUser={setUser} />}
                    <div className="text-center pb-10">
                        <button onClick={() => setShowSignup(!showSignup)} className="text-blue-600 hover:underline font-semibold">
                            {showSignup ? "ইতিমধ্যে অ্যাকাউন্ট আছে? লগ ইন করুন" : "নতুন অ্যাকাউন্ট তৈরি করুন (সাইন আপ)"}
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
