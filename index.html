<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি ও চাষ ব্যবস্থাপনা</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts (Bengali) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        /* Colorful Dot Wheel Spinner */
        .dot-spinner {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .dot-spinner div {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 0;
            left: 0;
            transform-origin: 40px 40px;
            animation: dot-spin 1.2s linear infinite;
        }
        @keyframes dot-spin {
            0% { transform: rotate(0deg) translate(32px, 0); }
            100% { transform: rotate(360deg) translate(32px, 0); }
        }
        
        /* Button Spinner */
        .btn-spinner {
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: btn-spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }

        /* Custom Scrollbar for professional look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
             apiKey: "AIzaSyCJd1-9NNhmI4rumaanY8A1VF4wLvg4pkg",
           authDomain: "crop-management-116fe.firebaseapp.com",
           projectId: "crop-management-116fe",
           storageBucket: "crop-management-116fe.firebasestorage.app",
           messagingSenderId: "1040293009053",
           appId: "1:1040293009053:web:7b68b487297b534048a674",
        };

        let auth, db;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (error) {
            console.error("Firebase Config Error. Please update your config.", error);
        }

        // ==========================================
        // 2. SPINNER COMPONENT
        // ==========================================
        const ColorfulSpinner = () => {
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F033FF', '#FF33A1', '#33FFF5', '#FFBD33', '#A133FF'];
            return (
                <div className="flex flex-col justify-center items-center h-screen bg-slate-900">
                    <div className="dot-spinner">
                        {colors.map((color, i) => (
                            <div key={i} style={{backgroundColor: color, animationDelay: `${i * 0.1}s`}}></div>
                        ))}
                    </div>
                    <p className="mt-6 text-slate-400 font-medium tracking-wide">সিস্টেম লোড হচ্ছে...</p>
                </div>
            );
        };

        // ==========================================
        // 3. AUTHENTICATION COMPONENTS
        // ==========================================
        
        // Login Component
        const Login = ({ setAuthMode }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("ভুল ইমেইল বা পাসওয়ার্ড! আবার চেষ্টা করুন।");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    {/* Background decorative blobs */}
                    <div className="absolute top-0 -left-20 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-0 -right-20 w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    
                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-indigo-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">শুভেচ্ছা</h2>
                            <p className="text-slate-500 mt-1">আপনার অ্যাকাউন্টে লগ ইন করুন</p>
                        </div>

                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}
                        
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল ঠিকানা</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="example@email.com" />
                            </div>
                            <div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <label className="block text-sm font-medium text-slate-700">পাসওয়ার্ড</label>
                                    <button type="button" onClick={() => setAuthMode('forgot')} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition">পাসওয়ার্ড ভুলে গেছেন?</button>
                                </div>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition ${loading ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'লগ ইন করুন'}
                            </button>
                        </form>

                        <p className="text-center text-sm text-slate-500 mt-6">
                            অ্যাকাউন্ট নেই? {' '}
                            <button onClick={() => setAuthMode('signup')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">
                                নতুন সাইন আপ করুন
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        // Signup Component
        const Signup = ({ setAuthMode }) => {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [mobile, setMobile] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [usernameStatus, setUsernameStatus] = useState({msg: '', color: ''});
            const [suggestedUsername, setSuggestedUsername] = useState('');

            useEffect(() => {
                if(username.length > 2) {
                    const timer = setTimeout(async () => {
                        const snapshot = await db.collection('users').where('username', '==', username).get();
                        if(!snapshot.empty) {
                            setUsernameStatus({msg: 'ইউজারনেমটি আগে ব্যবহার করা হয়েছে', color: 'rose'});
                            setSuggestedUsername(username + Math.floor(Math.random() * 100));
                        } else {
                            setUsernameStatus({msg: 'ইউজারনেমটি পাওয়া যাচ্ছে', color: 'emerald'});
                            setSuggestedUsername('');
                        }
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [username]);

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const uSnapshot = await db.collection('users').where('username', '==', username).get();
                    const eSnapshot = await db.collection('users').where('email', '==', email).get();
                    
                    if(!uSnapshot.empty || !eSnapshot.empty) {
                        throw new Error("ইউজারনেম বা ইমেইল আগে থেকেই ব্যবহৃত হচ্ছে!");
                    }

                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(userCredential.user.uid).set({
                        username, email, mobile, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-0 -right-20 w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-0 -left-20 w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>

                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-emerald-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">অ্যাকাউন্ট তৈরি করুন</h2>
                            <p className="text-slate-500 mt-1">চাষ ও ভূমির হিসাব শুরু করুন</p>
                        </div>

                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}
                        
                        <form onSubmit={handleSignup} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইউজারনেম</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required className={`w-full px-4 py-2.5 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:border-transparent transition ${usernameStatus.color === 'rose' ? 'border-rose-400 focus:ring-rose-500' : 'border-slate-300 focus:ring-indigo-500'}`} placeholder="আপনার নাম বা ইউজারনেম" />
                                {usernameStatus.msg && <p className={`text-xs mt-1 font-medium text-${usernameStatus.color}-600`}>{usernameStatus.msg}</p>}
                                {suggestedUsername && <p className="text-xs mt-1 text-slate-500">সাজেশন: <span className="text-indigo-600 cursor-pointer hover:underline" onClick={() => setUsername(suggestedUsername)}>{suggestedUsername}</span></p>}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="email@example.com" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1.5">মোবাইল</label>
                                    <input type="tel" value={mobile} onChange={(e) => setMobile(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="01XXXXXXXXX" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">পাসওয়ার্ড</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading || usernameStatus.color === 'rose'} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition mt-2 ${loading || usernameStatus.color === 'rose' ? 'bg-slate-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'সাইন আপ সম্পন্ন করুন'}
                            </button>
                        </form>

                        <p className="text-center text-sm text-slate-500 mt-6">
                            ইতিমধ্যে অ্যাকাউন্ট আছে? {' '}
                            <button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">
                                লগ ইন করুন
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        // Forgot Password Component
        const ForgotPassword = ({ setAuthMode }) => {
            const [email, setEmail] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [error, setError] = useState('');

            const handleReset = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setMessage('');
                try {
                    await auth.sendPasswordResetEmail(email);
                    setMessage("পাসওয়ার্ড রিসেট লিংক আপনার ইমেইলে পাঠানো হয়েছে। ইনবক্স চেক করুন।");
                } catch (err) {
                    setError("এই ইমেইল দিয়ে কোনো অ্যাকাউন্ট নেই।");
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    
                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-amber-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">পাসওয়ার্ড ভুলে গেছেন?</h2>
                            <p className="text-slate-500 mt-1">আপনার ইমেইল দিন, আমরা রিসেট লিংক পাঠাবো</p>
                        </div>

                        {message && <div className="bg-emerald-50 border border-emerald-200 text-emerald-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{message}</div>}
                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}

                        <form onSubmit={handleReset} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">নিবন্ধিত ইমেইল</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" placeholder="example@email.com" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition ${loading ? 'bg-amber-400 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'রিসেট লিংক পাঠান'}
                            </button>
                        </form>

                        <p className="text-center text-sm text-slate-500 mt-6">
                            পাসওয়ার্ড মনে পড়ে গেছে? {' '}
                            <button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">
                                লগ ইন পেজে ফিরে যান
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. DASHBOARD & FARMER MANAGEMENT
        // ==========================================
        const Dashboard = ({ user, loading, handleLogout }) => {
            const [farmers, setFarmers] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            
            // Add Farmer States
            const [name, setName] = useState('মোস্ত');
            const [landAmount, setLandAmount] = useState(33);
            const [startMonth, setStartMonth] = useState('জানুয়ারি');
            const [startYear, setStartYear] = useState(2026);
            const [rate, setRate] = useState(18000);
            const [advance, setAdvance] = useState(10000);

            useEffect(() => {
                if(user) {
                    const unsubscribe = db.collection('farmers').where('ownerId', '==', user.uid).onSnapshot(snapshot => {
                        const farmersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setFarmers(farmersData);
                    });
                    return () => unsubscribe();
                }
            }, [user]);

            const addFarmer = async (e) => {
                e.preventDefault();
                const total = landAmount * rate;
                const newFarmer = {
                    ownerId: user.uid,
                    name, landAmount, startMonth, startYear,
                    records: [{ 
                        year: startYear, 
                        rate: rate, 
                        total: total, 
                        paid: Number(advance), 
                        remaining: total - Number(advance) 
                    }]
                };
                await db.collection('farmers').add(newFarmer);
                setShowAddForm(false);
            };

            const addNewYear = async (farmerId, records, landAmount) => {
                const lastRecord = records[records.length - 1];
                const newYear = lastRecord.year + 1;
                const newRate = prompt(`${newYear} সালের জন্য নতুন দর (প্রতি শতাংশ) কত হবে?`, lastRecord.rate);
                if(newRate && !isNaN(newRate)) {
                    const total = landAmount * Number(newRate);
                    const newRecords = [...records, { year: newYear, rate: Number(newRate), total, paid: 0, remaining: total }];
                    await db.collection('farmers').doc(farmerId).update({ records: newRecords });
                }
            };

            const handlePayment = async (farmerId, records, amount) => {
                let remainingPayment = Number(amount);
                const newRecords = records.map(r => ({...r})).sort((a,b) => a.year - b.year);
                
                for(let rec of newRecords) {
                    if(remainingPayment <= 0) break;
                    if(rec.remaining > 0) {
                        const pay = Math.min(remainingPayment, rec.remaining);
                        rec.paid += pay;
                        rec.remaining -= pay;
                        remainingPayment -= pay;
                    }
                }
                await db.collection('farmers').doc(farmerId).update({ records: newRecords });
            };

            if(loading) return <ColorfulSpinner />;

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-slate-900 text-white shadow-lg">
                        <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                                <h1 className="text-xl md:text-2xl font-bold">ভূমি ব্যবস্থাপনা সিস্টেম</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="hidden md:block text-slate-300 text-sm border border-slate-700 px-3 py-1 rounded-full">{user.email}</span>
                                <button onClick={handleLogout} className="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-lg font-semibold transition flex items-center space-x-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                    <span>লগ আউট</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="container mx-auto p-4 md:p-8 flex-grow">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">চাষীদের তালিকা ও হিসাব</h2>
                            <button onClick={() => setShowAddForm(!showAddForm)} className={`px-5 py-2.5 rounded-lg font-semibold transition flex items-center space-x-2 ${showAddForm ? 'bg-slate-200 text-slate-700 hover:bg-slate-300' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md'}`}>
                                {showAddForm ? (
                                    <>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                        <span>বাতিল করুন</span>
                                    </>
                                ) : (
                                    <>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>
                                        <span>নতুন চাষী যোগ করুন</span>
                                    </>
                                )}
                            </button>
                        </div>

                        {showAddForm && (
                            <form onSubmit={addFarmer} className="bg-white p-6 rounded-xl shadow-lg mb-8 border border-slate-200">
                                <h3 className="text-lg font-semibold text-slate-700 mb-4 border-b pb-2">নতুন চাষীর তথ্য</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">চাষীর নাম</label>
                                        <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">জমির পরিমাণ (শতাংশ)</label>
                                        <input type="number" value={landAmount} onChange={e => setLandAmount(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">চাষ শুরুর মাস</label>
                                        <select value={startMonth} onChange={e => setStartMonth(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                            <option>জানুয়ারি</option>
                                            <option>ফেব্রুয়ারি</option>
                                            <option>মার্চ</option>
                                            <option>এপ্রিল</option>
                                            <option>মে</option>
                                            <option>জুন</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">চাষ শুরুর সাল</label>
                                        <input type="number" value={startYear} onChange={e => setStartYear(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">দর (প্রতি শতাংশ)</label>
                                        <input type="number" value={rate} onChange={e => setRate(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">অগ্রিম জমা</label>
                                        <input type="number" value={advance} onChange={e => setAdvance(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
                                    </div>
                                </div>
                                <button type="submit" className="mt-6 w-full md:w-auto bg-emerald-600 text-white px-8 py-2.5 rounded-lg hover:bg-emerald-700 font-semibold shadow-sm transition">
                                    চাষী সেভ করুন
                                </button>
                            </form>
                        )}

                        {/* Farmers Table */}
                        <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="min-w-full text-center border-collapse">
                                    <thead>
                                        <tr className="bg-slate-800 text-white">
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">চাষীর নাম</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">জমি (শতাংশ)</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">সাল</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">দর</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">মোট দেনদার</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">জমা</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold text-rose-300">বকেয়া</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">পেমেন্ট / নতুন সাল</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {farmers.map(farmer => (
                                            <FarmerRow key={farmer.id} farmer={farmer} handlePayment={handlePayment} addNewYear={addNewYear} />
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            {farmers.length === 0 && (
                                <div className="p-10 text-center text-slate-400">
                                    <svg className="w-16 h-16 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                    এখনও কোন চাষী যোগ করা হয়নি।
                                </div>
                            )}
                        </div>
                    </main>
                    
                    <footer className="bg-slate-800 text-slate-400 text-center p-4 text-sm mt-auto">
                        &copy; {new Date().getFullYear()} ভূমি ব্যবস্থাপনা সিস্টেম। সর্বস্বত্ব সংরক্ষিত।
                    </footer>
                </div>
            );
        };

        // Farmer Row Component
        const FarmerRow = ({ farmer, handlePayment, addNewYear }) => {
            const [payAmount, setPayAmount] = useState('');
            return (
                <>
                    {farmer.records.map((rec, index) => (
                        <tr key={index} className={`border-b border-slate-200 ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'} hover:bg-indigo-50 transition`}>
                            <td className="p-4 border border-slate-200 font-medium text-slate-800">{index === 0 ? farmer.name : ''}</td>
                            <td className="p-4 border border-slate-200 text-slate-600">{index === 0 ? farmer.landAmount : ''}</td>
                            <td className="p-4 border border-slate-200 text-slate-600">{rec.year}</td>
                            <td className="p-4 border border-slate-200 text-slate-600">{rec.rate.toLocaleString()} ৳</td>
                            <td className="p-4 border border-slate-200 text-slate-800 font-semibold">{rec.total.toLocaleString()} ৳</td>
                            <td className="p-4 border border-slate-200 text-emerald-600 font-semibold">{rec.paid.toLocaleString()} ৳</td>
                            <td className="p-4 border border-slate-200 text-rose-600 font-bold">{rec.remaining.toLocaleString()} ৳</td>
                            <td className="p-4 border border-slate-200">
                                {index === farmer.records.length - 1 ? (
                                    <div className="flex flex-col space-y-2 min-w-[180px]">
                                        <div className="flex justify-center items-center space-x-2">
                                            <input type="number" value={payAmount} onChange={e => setPayAmount(e.target.value)} placeholder="টাকার পরিমাণ" className="border border-slate-300 p-1.5 w-24 rounded text-center text-sm focus:ring-1 focus:ring-indigo-500 focus:outline-none" />
                                            <button onClick={() => { if(payAmount > 0){ handlePayment(farmer.id, farmer.records, payAmount); setPayAmount(''); } }} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-xs font-semibold hover:bg-indigo-700 transition">জমা দিন</button>
                                        </div>
                                        <button onClick={() => addNewYear(farmer.id, farmer.records, farmer.landAmount)} className="bg-slate-700 text-white px-2 py-1.5 rounded text-xs font-semibold hover:bg-slate-900 transition flex items-center justify-center space-x-1">
                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>
                                            <span>{rec.year + 1} সালের হিসাব যোগ করুন</span>
                                        </button>
                                    </div>
                                ) : <span className="text-slate-300">—</span>}
                            </td>
                        </tr>
                    ))}
                </>
            );
        };

        // ==========================================
        // 5. MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login'); // 'login', 'signup', 'forgot'

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(user => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                setUser(null);
                setAuthMode('login');
                window.location.reload(); 
            };

            if (loading) return <ColorfulSpinner />;

            if (user) return <Dashboard user={user} loading={loading} handleLogout={handleLogout} />;

            return (
                <>
                    {authMode === 'login' && <Login setAuthMode={setAuthMode} />}
                    {authMode === 'signup' && <Signup setAuthMode={setAuthMode} />}
                    {authMode === 'forgot' && <ForgotPassword setAuthMode={setAuthMode} />}
                </>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
