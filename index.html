<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমির হারির হিসাব ব্যবস্থাপনা</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        /* Beautiful Colorful Wheel Spinner */
        .ring-spinner { width: 80px; height: 80px; position: relative; }
        .ring-spinner div { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 8px solid transparent; }
        .ring-spinner div:nth-child(1) { border-top-color: #FF5733; animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
        .ring-spinner div:nth-child(2) { border-right-color: #33FF57; animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; animation-delay: -0.25s; }
        .ring-spinner div:nth-child(3) { border-bottom-color: #3357FF; animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; animation-delay: -0.5s; }
        .ring-spinner div:nth-child(4) { border-left-color: #F033FF; animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite; animation-delay: -0.75s; }
        .ring-center { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; background: #FFBD33; border-radius: 50%; transform: translate(-50%, -50%); animation: pulse 1.2s ease-in-out infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.5) translate(-50%, -50%); opacity: 0.5; } 50% { transform: scale(1) translate(-50%, -50%); opacity: 1; } }

        .btn-spinner { border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; width: 16px; height: 16px; animation: btn-spin 1s linear infinite; display: inline-block; }
        @keyframes btn-spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .modal-enter { animation: modal-fade-in 0.3s ease-out; }
        @keyframes modal-fade-in { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { animation: toast-in 0.3s ease-out; }
        @keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCJd1-9NNhmI4rumaanY8A1VF4wLvg4pkg",
           authDomain: "crop-management-116fe.firebaseapp.com",
           projectId: "crop-management-116fe",
           storageBucket: "crop-management-116fe.firebasestorage.app",
           messagingSenderId: "1040293009053",
           appId: "1:1040293009053:web:7b68b487297b534048a674",

        };

        let auth, db;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (error) { console.error("Firebase Error", error); }

        const cleanError = (err) => {
            let msg = err.message || "একটি ত্রুটি ঘটেছে।";
            msg = msg.replace(/\bhttps?:\/\/\S+/gi, '').replace(/\s+/g, ' ').trim();
            return msg;
        };

        // ==========================================
        // 2. HELPER COMPONENTS
        // ==========================================
        const ColorfulSpinner = () => {
            return (
                <div className="flex flex-col justify-center items-center h-screen bg-slate-900">
                    <div className="ring-spinner">
                        <div></div><div></div><div></div><div></div>
                        <div className="ring-center"></div>
                    </div>
                    <p className="mt-6 text-slate-400">সিস্টেম লোড হচ্ছে...</p>
                </div>
            );
        };

        const Toast = ({ message, type }) => {
            if (!message) return null;
            const colors = { success: 'bg-emerald-600', error: 'bg-rose-600', info: 'bg-indigo-600' };
            return (
                <div className="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-[100] toast-enter">
                    <div className={`${colors[type]} text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium flex items-center`}>
                        {message}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. AUTH COMPONENTS
        // ==========================================
        const Login = ({ setAuthMode, showToast }) => {
            const [emailOrUser, setEmailOrUser] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [suggestions, setSuggestions] = useState([]);

            useEffect(() => {
                const stored = JSON.parse(localStorage.getItem('loginUsernames') || '[]');
                setSuggestions(stored);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    let email = emailOrUser;
                    if (!emailOrUser.includes('@')) {
                        const snapshot = await db.collection('users').where('username', '==', emailOrUser).limit(1).get();
                        if (snapshot.empty) throw new Error("ইউজারনেম পাওয়া যায়নি");
                        email = snapshot.docs[0].data().email;
                    }
                    
                    const stored = JSON.parse(localStorage.getItem('loginUsernames') || '[]');
                    if (!stored.includes(emailOrUser)) {
                        stored.push(emailOrUser);
                        localStorage.setItem('loginUsernames', JSON.stringify(stored));
                    }

                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    showToast("ভুল ইমেইল/ইউজারনেম বা পাসওয়ার্ড!", "error");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-0 -left-20 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-0 -right-20 w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md z-10">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-slate-800">জমির হারির হিসাব</h2>
                            <p className="text-slate-500 mt-1">আপনার অ্যাকাউন্টে লগ ইন করুন</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল বা ইউজারনেম</label>
                                <input list="loginUsernames" type="text" value={emailOrUser} onChange={(e) => setEmailOrUser(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                <datalist id="loginUsernames">
                                    {suggestions.map((s, i) => <option key={i} value={s} />)}
                                </datalist>
                            </div>
                            <div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <label className="block text-sm font-medium text-slate-700">পাসওয়ার্ড</label>
                                    <button type="button" onClick={() => setAuthMode('forgot')} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800">ভুলে গেছেন?</button>
                                </div>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center ${loading ? 'bg-indigo-400' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'লগ ইন করুন'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6">অ্যাকাউন্ট নেই? <button onClick={() => setAuthMode('signup')} className="font-semibold text-indigo-600">নতুন সাইন আপ করুন</button></p>
                    </div>
                </div>
            );
        };

        const Signup = ({ setAuthMode, showToast }) => {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [mobile, setMobile] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [uStatus, setUStatus] = useState({msg: '', color: ''});

            useEffect(() => {
                if(username.length > 2) {
                    const timer = setTimeout(async () => {
                        const snap = await db.collection('users').where('username', '==', username).get();
                        if(!snap.empty) setUStatus({msg: 'ইউজারনেমটি আগে ব্যবহার করা হয়েছে', color: 'rose'});
                        else setUStatus({msg: 'ইউজারনেমটি পাওয়া যাচ্ছে', color: 'emerald'});
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [username]);

            const handleSignup = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    const uSnap = await db.collection('users').where('username', '==', username).get();
                    const eSnap = await db.collection('users').where('email', '==', email).get();
                    if(!uSnap.empty || !eSnap.empty) throw new Error("ইউজারনেম বা ইমেইল ব্যবহৃত হচ্ছে!");
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(cred.user.uid).set({ username, email, mobile });
                    showToast("সাইন আপ সফল হয়েছে!", "success");
                } catch (err) { showToast(cleanError(err), "error"); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-0 -right-20 w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md z-10">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-slate-800">অ্যাকাউন্ট তৈরি করুন</h2>
                        </div>
                        <form onSubmit={handleSignup} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইউজারনেম</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required className={`w-full px-4 py-2.5 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 ${uStatus.color === 'rose' ? 'border-rose-400 focus:ring-rose-500' : 'border-slate-300 focus:ring-indigo-500'}`} />
                                {uStatus.msg && <p className={`text-xs mt-1 font-medium text-${uStatus.color}-600`}>{uStatus.msg}</p>}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">মোবাইল</label><input type="tel" value={mobile} onChange={(e) => setMobile(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                            </div>
                            <div><label className="block text-sm font-medium text-slate-700 mb-1.5">পাসওয়ার্ড</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                            <button type="submit" disabled={loading || uStatus.color === 'rose'} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center ${loading || uStatus.color === 'rose' ? 'bg-slate-400' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'সাইন আপ করুন'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6">অ্যাকাউন্ট আছে? <button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600">লগ ইন করুন</button></p>
                    </div>
                </div>
            );
        };

        const ForgotPassword = ({ setAuthMode, showToast }) => {
            const [email, setEmail] = useState('');
            const [loading, setLoading] = useState(false);

            const handleReset = async (e) => {
                e.preventDefault(); setLoading(true);
                try { await auth.sendPasswordResetEmail(email); showToast("রিসেট লিংক ইমেইলে পাঠানো হয়েছে", "success"); setAuthMode('login'); } 
                catch (err) { showToast(cleanError(err), "error"); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="relative bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md z-10">
                        <h2 className="text-3xl font-bold text-center text-slate-800 mb-6">পাসওয়ার্ড রিসেট</h2>
                        <form onSubmit={handleReset} className="space-y-5">
                            <div><label className="block text-sm font-medium text-slate-700 mb-1.5">নিবন্ধিত ইমেইল</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500" /></div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center ${loading ? 'bg-amber-400' : 'bg-amber-500 hover:bg-amber-600'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'রিসেট লিংক পাঠান'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6"><button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600">লগ ইন পেজে যান</button></p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. MODALS & DASHBOARD
        // ==========================================
        const PasswordConfirmModal = ({ onClose, onConfirm, showToast, message }) => {
            const [pwd, setPwd] = useState('');
            const [loading, setLoading] = useState(false);

            const handleConfirm = async () => {
                setLoading(true);
                try {
                    const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, pwd);
                    await auth.currentUser.reauthenticateWithCredential(cred);
                    onConfirm();
                } catch (err) {
                    showToast("পাসওয়ার্ড ভুল হয়েছে!", "error");
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 modal-enter" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-slate-800 mb-2">নিরাপত্তা যাচাইকরণ</h3>
                        <p className="text-sm text-rose-600 font-medium mb-4">{message || "এই কাজটি করার জন্য আপনার পাসওয়ার্ড দিন।"}</p>
                        <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg mb-4 focus:ring-2 focus:ring-rose-500 outline-none" placeholder="পাসওয়ার্ড" />
                        <div className="flex space-x-2">
                            <button onClick={onClose} className="flex-1 bg-slate-200 py-2 rounded-lg font-semibold text-slate-700">বাতিল</button>
                            <button onClick={handleConfirm} disabled={loading || !pwd} className={`flex-1 py-2 rounded-lg font-semibold text-white flex justify-center items-center ${loading ? 'bg-rose-400' : 'bg-rose-600 hover:bg-rose-700'}`}>
                                {loading ? <span className="btn-spinner"></span> : 'কনফার্ম করুন'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const PurgeDatabaseModal = ({ onClose, onConfirm, showToast }) => {
            const [fromY, setFromY] = useState('');
            const [toY, setToY] = useState('');
            const [pwd, setPwd] = useState('');
            const [loading, setLoading] = useState(false);

            const handleConfirm = async () => {
                if(!fromY || !toY) { showToast("সাল উল্লেখ করুন", "error"); return; }
                setLoading(true);
                try {
                    const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, pwd);
                    await auth.currentUser.reauthenticateWithCredential(cred);
                    await onConfirm(fromY, toY);
                } catch (err) {
                    showToast("পাসওয়ার্ড ভুল হয়েছে!", "error");
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 modal-enter" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-slate-800 mb-2">ডাটাবেজ পার্জ (Purge)</h3>
                        <p className="text-sm text-rose-600 font-medium mb-4">শুধুমাত্র ডিলিট করা চাষীদের পুরোনো হিসাব মুছবে। বর্তমান তালিকার Active চাষীদের কোনো তথ্য মুছবে না।</p>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div><label className="text-xs block mb-1">কোন সাল থেকে?</label><input type="number" value={fromY} onChange={e => setFromY(e.target.value)} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-rose-500" /></div>
                            <div><label className="text-xs block mb-1">কোন সাল পর্যন্ত?</label><input type="number" value={toY} onChange={e => setToY(e.target.value)} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-rose-500" /></div>
                        </div>
                        <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg mb-4 focus:ring-2 focus:ring-rose-500 outline-none" placeholder="পাসওয়ার্ড" />
                        <div className="flex space-x-2">
                            <button onClick={onClose} className="flex-1 bg-slate-200 py-2 rounded-lg font-semibold text-slate-700">বাতিল</button>
                            <button onClick={handleConfirm} disabled={loading || !pwd} className={`flex-1 py-2 rounded-lg font-semibold text-white flex justify-center items-center ${loading ? 'bg-rose-400' : 'bg-rose-600 hover:bg-rose-700'}`}>
                                {loading ? <span className="btn-spinner"></span> : 'কনফার্ম করে ডিলিট করুন'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AddYearModal = ({ farmer, onClose, onSave }) => {
            const [year, setYear] = useState(farmer.records[farmer.records.length - 1].year + 1);
            const [land, setLand] = useState(farmer.landAmount);
            const [rate, setRate] = useState(farmer.records[farmer.records.length - 1].rate);

            const handleSave = () => {
                const total = (Number(land) / 33) * Number(rate);
                onSave({ year: Number(year), landAmount: Number(land), rate: Number(rate), total, paid: 0, remaining: total });
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 modal-enter" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-slate-800 mb-4">নতুন সালের হিসাব যোগ করুন</h3>
                        <div className="space-y-4">
                            <div><label className="block text-sm mb-1">সাল</label><input type="number" value={year} onChange={e => setYear(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                            <div><label className="block text-sm mb-1">জমির পরিমাণ (শতাংশ)</label><input type="number" value={land} onChange={e => setLand(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                            <div><label className="block text-sm mb-1">দর (প্রতি ৩৩ শতাংশ)</label><input type="number" value={rate} onChange={e => setRate(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                        </div>
                        <div className="flex space-x-2 mt-6">
                            <button onClick={onClose} className="flex-1 bg-slate-200 py-2 rounded-lg font-semibold text-slate-700">বাতিল</button>
                            <button onClick={handleSave} className="flex-1 bg-indigo-600 py-2 rounded-lg font-semibold text-white hover:bg-indigo-700">সেভ করুন</button>
                        </div>
                    </div>
                </div>
            );
        };

        const FarmerDetailsModal = ({ farmer, onClose, handlePayment, addNewYear, handleDeleteRecord, softDeleteFarmer }) => {
            const [payAmount, setPayAmount] = useState('');
            const fTotalPaid = farmer.records.reduce((a, r) => a + r.paid, 0);
            const fTotalDue = farmer.records.reduce((a, r) => a + r.remaining, 0);

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 overflow-y-auto" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl my-8 modal-enter" onClick={e => e.stopPropagation()}>
                        <div className="bg-slate-800 text-white p-5 rounded-t-2xl flex justify-between items-center">
                            <div>
                                <h3 className="text-xl font-bold">{farmer.name}</h3>
                                <p className="text-slate-300 text-xs mt-1">জমি: {farmer.landAmount} শতাংশ | শুরু: {farmer.startMonth}, {farmer.startYear}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        <div className="p-5">
                            <div className="grid grid-cols-2 gap-3 mb-5">
                                <div className="bg-emerald-50 p-3 rounded-lg text-center"><p className="text-xs text-emerald-700">মোট জমা</p><h4 className="text-xl font-bold text-emerald-800">{fTotalPaid.toLocaleString()} ৳</h4></div>
                                <div className="bg-rose-50 p-3 rounded-lg text-center"><p className="text-xs text-rose-700">মোট বকেয়া</p><h4 className="text-xl font-bold text-rose-800">{fTotalDue.toLocaleString()} ৳</h4></div>
                            </div>
                            
                            <div className="mb-5 border rounded-lg overflow-hidden">
                                <table className="w-full text-center">
                                    <thead className="bg-slate-100 text-[10px] sm:text-xs">
                                        <tr>
                                            <th className="p-1.5 border-b">সাল</th>
                                            <th className="p-1.5 border-b">দর (৩৩ শতাংশ)</th>
                                            <th className="p-1.5 border-b">মোট</th>
                                            <th className="p-1.5 border-b">জমা</th>
                                            <th className="p-1.5 border-b">বকেয়া</th>
                                            <th className="p-1.5 border-b">-</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-[11px] sm:text-sm">
                                        {farmer.records.map((rec, i) => (
                                            <tr key={i} className="hover:bg-slate-50">
                                                <td className="p-1.5 border-b">{rec.year}</td>
                                                <td className="p-1.5 border-b">{rec.rate.toLocaleString()}</td>
                                                <td className="p-1.5 border-b">{rec.total.toLocaleString()}</td>
                                                <td className="p-1.5 border-b text-emerald-600">{rec.paid.toLocaleString()}</td>
                                                <td className="p-1.5 border-b font-bold text-rose-600">{rec.remaining === 0 ? <span className="text-emerald-600 text-[10px]">পরিশোধ</span> : rec.remaining.toLocaleString()}</td>
                                                <td className="p-1.5 border-b"><button onClick={() => handleDeleteRecord(farmer, i)} className="text-rose-500 hover:text-rose-700"><svg className="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="bg-slate-50 p-2 rounded-lg border mb-4">
                                <label className="block text-[10px] font-medium text-slate-700 mb-1">নতুন কিস্তি জমা দিন (তারিখ অটো সেভ হবে)</label>
                                <div className="flex space-x-1 items-center">
                                    <input type="number" value={payAmount} onChange={e => setPayAmount(e.target.value)} placeholder="টাকা" className="flex-1 p-1.5 border rounded text-xs outline-none focus:ring-1 focus:ring-indigo-500" />
                                    <button onClick={() => { if(payAmount > 0) { handlePayment(farmer, payAmount); setPayAmount(''); } }} className="bg-indigo-600 text-white px-2 py-1.5 rounded text-xs font-semibold">জমা করুন</button>
                                </div>
                            </div>
                            <div className="flex space-y-2 md:space-y-0 md:space-x-2 flex-col md:flex-row">
                                <button onClick={() => addNewYear(farmer)} className="flex-1 bg-slate-700 text-white py-2 rounded-lg text-sm font-semibold hover:bg-slate-800">নতুন সাল যোগ করুন</button>
                                <button onClick={() => softDeleteFarmer(farmer)} className="flex-1 bg-rose-100 text-rose-700 py-2 rounded-lg text-sm font-semibold hover:bg-rose-200">চাষী ডিলিট করুন</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, handleLogout, showToast }) => {
            const [farmers, setFarmers] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedFarmer, setSelectedFarmer] = useState(null);
            const [showYearModal, setShowYearModal] = useState(null);
            const [pwdModal, setPwdModal] = useState({ show: false, action: null, message: '' });
            const [showPurgeModal, setShowPurgeModal] = useState(false);
            const [pdfPreview, setPdfPreview] = useState(null);
            const [toast, setToast] = useState(null);
            const [monthLang, setMonthLang] = useState('bn'); 
            const [formData, setFormData] = useState({ name: '', landAmount: 33, startMonth: 'বৈশাখ', startYear: new Date().getFullYear(), rate: 18000, advance: 0 });
            
            const bnMonths = ['বৈশাখ', 'জ্যৈষ্ঠ', 'আষাঢ়', 'শ্রাবণ', 'ভাদ্র', 'আশ্বিন', 'কার্তিক', 'অগ্রহায়ণ', 'পৌষ', 'মাঘ', 'ফাল্গুন', 'চৈত্র'];
            const enMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            const showToastMsg = (msg, type) => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                let timer;
                const resetTimer = () => {
                    clearTimeout(timer);
                    timer = setTimeout(() => {
                        auth.signOut();
                        showToastMsg("অনেকক্ষণ নিষ্ক্রিয় থাকায় অটো লগআউট হয়েছে", "info");
                    }, 300000); 
                };
                const events = ['mousemove', 'keydown', 'click', 'scroll'];
                events.forEach(e => window.addEventListener(e, resetTimer));
                resetTimer();
                return () => events.forEach(e => window.removeEventListener(e, resetTimer));
            }, []);

            useEffect(() => {
                const unsub = db.collection('farmers').where('ownerId', '==', user.uid).where('status', '==', 'active').onSnapshot(snap => {
                    setFarmers(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, [user]);

            useEffect(() => {
                if(monthLang === 'bn' && !bnMonths.includes(formData.startMonth)) {
                    setFormData({...formData, startMonth: bnMonths[0]});
                } else if(monthLang === 'en' && !enMonths.includes(formData.startMonth)) {
                    setFormData({...formData, startMonth: enMonths[0]});
                }
            }, [monthLang]);

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const addFarmer = async (e) => {
                e.preventDefault();
                const total = (Number(formData.landAmount) / 33) * Number(formData.rate);
                const newFarmer = {
                    ownerId: user.uid, name: formData.name, landAmount: Number(formData.landAmount), startMonth: formData.startMonth, startYear: Number(formData.startYear),
                    status: 'active',
                    records: [{ year: Number(formData.startYear), rate: Number(formData.rate), total, paid: Number(formData.advance), remaining: total - Number(formData.advance) }],
                    payments: [] 
                };
                await db.collection('farmers').add(newFarmer);
                setShowAddForm(false);
                showToastMsg("নতুন চাষী যোগ হয়েছে", "success");
            };

            const handlePayment = async (farmer, amount) => {
                let pay = Number(amount);
                const newRecs = farmer.records.map(r => ({...r})).sort((a,b) => a.year - b.year);
                for(let rec of newRecs) {
                    if(pay <= 0) break;
                    if(rec.remaining > 0) {
                        const p = Math.min(pay, rec.remaining);
                        rec.paid += p; rec.remaining -= p; pay -= p;
                    }
                }
                
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const newPaymentRecord = { date: dateStr, amount: Number(amount) };
                const updatedPayments = [...(farmer.payments || []), newPaymentRecord];

                await db.collection('farmers').doc(farmer.id).update({ 
                    records: newRecs, 
                    payments: updatedPayments 
                });
                
                setSelectedFarmer({...farmer, records: newRecs, payments: updatedPayments});
                showToastMsg("টাকা জমা সফল হয়েছে এবং তারিখ রেকর্ড হয়েছে", "success");
            };

            const addNewYear = (farmer) => {
                setShowYearModal(farmer);
                setSelectedFarmer(null);
            };

            const saveNewYear = async (newRecord) => {
                const f = showYearModal;
                const newRecs = [...f.records, newRecord];
                await db.collection('farmers').doc(f.id).update({ records: newRecs, landAmount: newRecord.landAmount });
                setShowYearModal(null);
                showToastMsg("নতুন সালের হিসাব যোগ হয়েছে", "success");
            };

            const handleDeleteRecord = (farmer, index) => {
                setPwdModal({
                    show: true,
                    message: "এই সালের হিসাবটি ডিলিট হয়ে যাবে।",
                    action: async () => {
                        const newRecs = farmer.records.filter((_, i) => i !== index);
                        await db.collection('farmers').doc(farmer.id).update({ records: newRecs });
                        setSelectedFarmer({...farmer, records: newRecs}); 
                        setPwdModal({ show: false, action: null, message: '' });
                        showToastMsg("রেকর্ড ডিলিট হয়েছে", "success");
                    }
                });
            };

            const softDeleteFarmer = (farmer) => {
                setPwdModal({
                    show: true,
                    message: "চাষীর সকল হিসাব ডিলিট হয়ে যাবে।",
                    action: async () => {
                        await db.collection('farmers').doc(farmer.id).update({ status: 'inactive' });
                        setPwdModal({ show: false, action: null, message: '' });
                        setSelectedFarmer(null);
                        showToastMsg("চাষী ডিলিট করা হয়েছে", "success");
                    }
                });
            };

            const exportFarmerPDF = (farmer, preview = false) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18); doc.text("Land Management Report", 14, 15);
                doc.setFontSize(12); doc.text(`Name: ${farmer.name}`, 14, 25); doc.text(`Land: ${farmer.landAmount} Shotangsho`, 14, 32);
                doc.autoTable({
                    startY: 40, head: [['Year', 'Rate (33 Sqt)', 'Total', 'Paid', 'Remaining']],
                    body: farmer.records.map(r => [r.year, `${r.rate}`, `${r.total}`, `${r.paid}`, `${r.remaining}`]),
                    headStyles: { fillColor: [49, 46, 129] }
                });
                
                if (farmer.payments && farmer.payments.length > 0) {
                    const finalY = doc.lastAutoTable.finalY || 40;
                    doc.setFontSize(14); doc.text("Payment History", 14, finalY + 10);
                    doc.autoTable({
                        startY: finalY + 14,
                        head: [['Date', 'Amount Paid']],
                        body: farmer.payments.map(p => [p.date, `${p.amount} Tk`]),
                        headStyles: { fillColor: [22, 163, 74] } 
                    });
                }
                
                if (preview) {
                    const dataUri = doc.output('datauristring');
                    setPdfPreview({ uri: dataUri, name: farmer.name, doc: doc });
                } else {
                    doc.save(`${farmer.name}_report.pdf`);
                }
            };

            const exportAllPDF = () => {
                setPwdModal({
                    show: true,
                    message: "সকল চাষীর রিপোর্ট ডাউনলোড হবে।",
                    action: async () => {
                        setPwdModal({ show: false, action: null, message: '' });
                        showToastMsg("রিপোর্ট তৈরি হচ্ছে...", "info");
                        const snap = await db.collection('farmers').where('ownerId', '==', user.uid).get();
                        const allFarmers = snap.docs.map(d => d.data());
                        const { jsPDF } = window.jspdf;
                        const doc = new jsPDF();
                        
                        allFarmers.forEach((f, idx) => {
                            if(idx > 0) doc.addPage();
                            doc.setFontSize(18); doc.text("Full Land Management Report", 14, 15);
                            doc.setFontSize(12); doc.text(`Farmer: ${f.name} (${f.status})`, 14, 25); doc.text(`Land: ${f.landAmount} Shotangsho`, 14, 32);
                            doc.autoTable({
                                startY: 40, head: [['Year', 'Rate (33 Sqt)', 'Total', 'Paid', 'Remaining']],
                                body: f.records.map(r => [r.year, `${r.rate}`, `${r.total}`, `${r.paid}`, `${r.remaining}`]),
                                headStyles: { fillColor: [49, 46, 129] }
                            });
                            
                            if (f.payments && f.payments.length > 0) {
                                const finalY = doc.lastAutoTable.finalY || 40;
                                doc.setFontSize(12); doc.text("Payment History", 14, finalY + 8);
                                doc.autoTable({
                                    startY: finalY + 12,
                                    head: [['Date', 'Amount']],
                                    body: f.payments.map(p => [p.date, `${p.amount} Tk`]),
                                    headStyles: { fillColor: [22, 163, 74] }
                                });
                            }
                        });
                        doc.save(`All_Farmers_Report.pdf`);
                    }
                });
            };

            const handlePurgeConfirm = async (fromY, toY) => {
                // Explicitly fetch ONLY inactive farmers
                const snap = await db.collection('farmers')
                    .where('ownerId', '==', user.uid)
                    .where('status', '==', 'inactive') 
                    .get();
                    
                const batch = db.batch();
                snap.forEach(doc => {
                    const f = doc.data();
                    const filteredRecs = f.records.filter(r => r.year < Number(fromY) || r.year > Number(toY));
                    if(filteredRecs.length === 0) {
                        batch.delete(doc.ref);
                    } else {
                        batch.update(doc.ref, { records: filteredRecs });
                    }
                });
                await batch.commit();
                setShowPurgeModal(false);
                showToastMsg("পুরোনো ডাটা সফলভাবে মুছে ফেলা হয়েছে", "success");
            };

            const totalDue = farmers.reduce((acc, f) => acc + f.records.reduce((a, r) => a + r.remaining, 0), 0);

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    <nav className="bg-slate-900 text-white shadow-lg sticky top-0 z-40">
                        <div className="container mx-auto px-4 py-4 flex justify-between items-center relative">
                            
                            <div className="flex items-center space-x-2 z-10">
                                <svg className="w-6 h-6 md:w-7 md:h-7 text-indigo-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                                <h1 className="md:hidden text-base font-bold text-white">হারি হিসাব</h1>
                                <h1 className="hidden md:block text-2xl lg:text-3xl font-bold text-white tracking-wide whitespace-nowrap">হারি হিসাব ব্যবস্থাপনা</h1>
                            </div>

                            <div className="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center space-x-8 text-white">
                                <div className="flex flex-col items-center">
                                    <span className="text-xs text-slate-400 font-medium">মোট চাষী</span>
                                    <span className="text-xl font-bold text-white">{farmers.length} জন</span>
                                </div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="flex flex-col items-center">
                                    <span className="text-xs text-slate-400 font-medium">মোট বকেয়া</span>
                                    <span className="text-xl font-bold text-rose-400">{totalDue.toLocaleString()} ৳</span>
                                </div>
                            </div>

                            <div className="flex items-center justify-end space-x-2 ml-auto z-10">
                                <button onClick={exportAllPDF} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg" title="সকল রিপোর্ট PDF">
                                    <svg className="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                </button>
                                <button onClick={() => setShowPurgeModal(true)} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg" title="ডাটাবেজ পার্জ">
                                    <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                                <button onClick={handleLogout} className="p-2 bg-rose-600 hover:bg-rose-700 rounded-lg" title="লগ আউট">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="container mx-auto p-3 md:p-8 flex-grow w-full">
                        <div className="md:hidden mb-4 bg-white p-2 rounded-lg shadow flex items-center justify-between border-l-4 border-rose-500">
                            <div className="flex items-center space-x-2">
                                <p className="text-slate-500 text-[10px] font-medium">মোট বকেয়া</p>
                                <h3 className="text-sm font-bold text-rose-600">{totalDue.toLocaleString()} ৳</h3>
                            </div>
                            <svg className="w-4 h-4 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                        </div>

                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg md:text-2xl font-bold text-slate-800">চাষীদের তালিকা</h2>
                            <button onClick={() => setShowAddForm(!showAddForm)} className={`px-3 py-2 rounded-lg font-semibold text-sm text-white ${showAddForm ? 'bg-slate-500' : 'bg-indigo-600 hover:bg-indigo-700'}`}>{showAddForm ? 'বাতিল' : 'নতুন যোগ করুন'}</button>
                        </div>

                        {showAddForm && (
                            <form onSubmit={addFarmer} className="bg-white p-4 rounded-xl shadow-lg mb-6 border">
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                    <div><label className="text-xs block mb-1">নাম</label><input type="text" name="name" value={formData.name} onChange={handleChange} required className="w-full p-2 border rounded text-sm" /></div>
                                    <div><label className="text-xs block mb-1">জমি (শতাংশ)</label><input type="number" name="landAmount" value={formData.landAmount} onChange={handleChange} required className="w-full p-2 border rounded text-sm" /></div>
                                    
                                    <div>
                                        <label className="text-xs block mb-1">মাস</label>
                                        <div className="flex space-x-2 mb-1">
                                            <label className="text-xs flex items-center"><input type="radio" name="monthLang" value="bn" checked={monthLang === 'bn'} onChange={() => setMonthLang('bn')} className="mr-1"/> বাংলা</label>
                                            <label className="text-xs flex items-center"><input type="radio" name="monthLang" value="en" checked={monthLang === 'en'} onChange={() => setMonthLang('en')} className="mr-1"/> ইংরেজি</label>
                                        </div>
                                        <select name="startMonth" value={formData.startMonth} onChange={handleChange} className="w-full p-2 border rounded text-sm bg-white">
                                            {monthLang === 'bn' ? bnMonths.map(m => <option key={m}>{m}</option>) : enMonths.map(m => <option key={m}>{m}</option>)}
                                        </select>
                                    </div>

                                    <div><label className="text-xs block mb-1">সাল</label><input type="number" name="startYear" value={formData.startYear} onChange={handleChange} required className="w-full p-2 border rounded text-sm" /></div>
                                    <div><label className="text-xs block mb-1">দর (৩৩ শতাংশ)</label><input type="number" name="rate" value={formData.rate} onChange={handleChange} required className="w-full p-2 border rounded text-sm" /></div>
                                    <div><label className="text-xs block mb-1">অগ্রিম জমা (টাকা)</label><input type="number" name="advance" value={formData.advance} onChange={handleChange} required className="w-full p-2 border rounded text-sm" /></div>
                                </div>
                                <button type="submit" className="mt-3 bg-emerald-600 text-white px-4 py-2 rounded text-sm hover:bg-emerald-700">সেভ করুন</button>
                            </form>
                        )}

                        {/* Desktop Standard Table */}
                        <div className="hidden md:block bg-white rounded-xl shadow-lg border overflow-hidden">
                            <table className="min-w-full text-center">
                                <thead><tr className="bg-slate-800 text-white text-sm"><th className="p-3">নাম</th><th className="p-3">জমি</th><th className="p-3">মোট জমা</th><th className="p-3">মোট বকেয়া</th><th className="p-3">অ্যাকশন</th></tr></thead>
                                <tbody>
                                    {farmers.map(f => {
                                        const paid = f.records.reduce((a, r) => a + r.paid, 0);
                                        const due = f.records.reduce((a, r) => a + r.remaining, 0);
                                        return (
                                            <tr key={f.id} className="border-b hover:bg-slate-50">
                                                <td className="p-3 text-left font-medium">{f.name}</td>
                                                <td className="p-3">{f.landAmount}</td>
                                                <td className="p-3 text-emerald-600 font-semibold">{paid.toLocaleString()} ৳</td>
                                                <td className="p-3 text-rose-600 font-bold">{due.toLocaleString()} ৳</td>
                                                <td className="p-3">
                                                    <div className="flex items-center justify-center gap-2">
                                                        <button onClick={() => setSelectedFarmer(f)} className="bg-indigo-100 text-indigo-700 p-2 rounded-lg" title="বিস্তারিত দেখুন">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                                        </button>
                                                        <button onClick={() => exportFarmerPDF(f, true)} className="bg-rose-100 text-rose-700 p-2 rounded-lg" title="পিডিএফ ডাউনলোড করুন">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {/* Mobile Slim One-Line List */}
                        <div className="md:hidden flex flex-col space-y-2">
                            {farmers.map(f => {
                                const paid = f.records.reduce((a, r) => a + r.paid, 0);
                                const due = f.records.reduce((a, r) => a + r.remaining, 0);
                                return (
                                    <div key={f.id} className="flex items-center justify-between bg-white p-2 rounded-lg shadow border-l-4 border-indigo-500 text-xs">
                                        <div className="flex-1 min-w-0 pr-2">
                                            <span className="font-bold text-slate-800 block truncate">{f.name}</span>
                                            <span className="text-rose-600 font-bold">বকেয়া: {due.toLocaleString()} ৳</span>
                                        </div>
                                        <div className="flex items-center space-x-1 flex-shrink-0">
                                            <button onClick={() => setSelectedFarmer(f)} className="text-indigo-600 p-1.5 rounded hover:bg-indigo-50" title="বিস্তারিত">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                            </button>
                                            <button onClick={() => exportFarmerPDF(f, true)} className="text-rose-600 p-1.5 rounded hover:bg-rose-50" title="পিডিএফ">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                    
                    <Toast message={toast?.msg} type={toast?.type} />

                    {selectedFarmer && <FarmerDetailsModal farmer={selectedFarmer} onClose={() => setSelectedFarmer(null)} handlePayment={handlePayment} addNewYear={addNewYear} handleDeleteRecord={handleDeleteRecord} softDeleteFarmer={softDeleteFarmer} />}
                    {showYearModal && <AddYearModal farmer={showYearModal} onClose={() => setShowYearModal(null)} onSave={saveNewYear} />}
                    {pwdModal.show && <PasswordConfirmModal onClose={() => setPwdModal({show: false, action: null, message: ''})} onConfirm={pwdModal.action} showToast={showToastMsg} message={pwdModal.message} />}
                    {showPurgeModal && <PurgeDatabaseModal onClose={() => setShowPurgeModal(false)} onConfirm={handlePurgeConfirm} showToast={showToastMsg} />}
                    
                    {pdfPreview && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col p-4">
                            <div className="bg-white rounded-lg p-3 mb-2 flex justify-between items-center">
                                <h3 className="font-bold text-sm text-slate-800">{pdfPreview.name} এর পিডিএফ প্রিভিউ</h3>
                                <div className="flex space-x-2">
                                    <button onClick={() => pdfPreview.doc.save(`${pdfPreview.name}_report.pdf`)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-semibold">ডাউনলোড করুন</button>
                                    <button onClick={() => setPdfPreview(null)} className="bg-rose-500 text-white px-4 py-2 rounded-lg text-xs font-semibold">বন্ধ করুন</button>
                                </div>
                            </div>
                            <iframe src={pdfPreview.uri} className="w-full flex-grow bg-white rounded-lg" frameBorder="0" title="PDF Preview"></iframe>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5. MAIN APP
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login');
            const [toast, setToast] = useState(null);

            const showToast = (msg, type) => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                setUser(null);
                setAuthMode('login');
            };

            if (loading) return <ColorfulSpinner />;
            if (user) return <Dashboard user={user} handleLogout={handleLogout} showToast={showToast} />;

            return (
                <>
                    {authMode === 'login' && <Login setAuthMode={setAuthMode} showToast={showToast} />}
                    {authMode === 'signup' && <Signup setAuthMode={setAuthMode} showToast={showToast} />}
                    {authMode === 'forgot' && <ForgotPassword setAuthMode={setAuthMode} showToast={showToast} />}
                    <Toast message={toast?.msg} type={toast?.type} />
                </>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
