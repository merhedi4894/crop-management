<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি ও চাষ ব্যবস্থাপনা</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore-compat.js"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF & Excel Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Google Fonts (Bengali) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        
        /* Colorful Dot Wheel Spinner */
        .dot-spinner { position: relative; width: 80px; height: 80px; }
        .dot-spinner div { position: absolute; width: 16px; height: 16px; border-radius: 50%; top: 0; left: 0; transform-origin: 40px 40px; animation: dot-spin 1.2s linear infinite; }
        @keyframes dot-spin { 0% { transform: rotate(0deg) translate(32px, 0); } 100% { transform: rotate(360deg) translate(32px, 0); } }
        
        /* Button Spinner */
        .btn-spinner { border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; width: 16px; height: 16px; animation: btn-spin 1s linear infinite; display: inline-block; }
        @keyframes btn-spin { to { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Modal Animation */
        .modal-enter { animation: modal-fade-in 0.3s ease-out; }
        @keyframes modal-fade-in { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCJd1-9NNhmI4rumaanY8A1VF4wLvg4pkg",
           authDomain: "crop-management-116fe.firebaseapp.com",
           projectId: "crop-management-116fe",
           storageBucket: "crop-management-116fe.firebasestorage.app",
           messagingSenderId: "1040293009053",
           appId: "1:1040293009053:web:7b68b487297b534048a674",
        };

        let auth, db;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (error) {
            console.error("Firebase Config Error. Please update your config.", error);
        }

        // ==========================================
        // 2. SPINNER COMPONENT
        // ==========================================
        const ColorfulSpinner = () => {
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F033FF', '#FF33A1', '#33FFF5', '#FFBD33', '#A133FF'];
            return (
                <div className="flex flex-col justify-center items-center h-screen bg-slate-900">
                    <div className="dot-spinner">
                        {colors.map((color, i) => (
                            <div key={i} style={{backgroundColor: color, animationDelay: `${i * 0.1}s`}}></div>
                        ))}
                    </div>
                    <p className="mt-6 text-slate-400 font-medium tracking-wide">সিস্টেম লোড হচ্ছে...</p>
                </div>
            );
        };

        // ==========================================
        // 3. AUTHENTICATION COMPONENTS
        // (Same as before - Login, Signup, ForgotPassword)
        // ==========================================
        const Login = ({ setAuthMode }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setError('');
                try { await auth.signInWithEmailAndPassword(email, password); } 
                catch (err) { setError("ভুল ইমেইল বা পাসওয়ার্ড! আবার চেষ্টা করুন।"); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-0 -left-20 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-0 -right-20 w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-indigo-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">শুভেচ্ছা</h2>
                            <p className="text-slate-500 mt-1">আপনার অ্যাকাউন্টে লগ ইন করুন</p>
                        </div>
                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল ঠিকানা</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="example@email.com" />
                            </div>
                            <div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <label className="block text-sm font-medium text-slate-700">পাসওয়ার্ড</label>
                                    <button type="button" onClick={() => setAuthMode('forgot')} className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition">পাসওয়ার্ড ভুলে গেছেন?</button>
                                </div>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition ${loading ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'লগ ইন করুন'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6">অ্যাকাউন্ট নেই? {' '}<button onClick={() => setAuthMode('signup')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">নতুন সাইন আপ করুন</button></p>
                    </div>
                </div>
            );
        };

        const Signup = ({ setAuthMode }) => {
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [mobile, setMobile] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [usernameStatus, setUsernameStatus] = useState({msg: '', color: ''});
            const [suggestedUsername, setSuggestedUsername] = useState('');

            useEffect(() => {
                if(username.length > 2) {
                    const timer = setTimeout(async () => {
                        const snapshot = await db.collection('users').where('username', '==', username).get();
                        if(!snapshot.empty) { setUsernameStatus({msg: 'ইউজারনেমটি আগে ব্যবহার করা হয়েছে', color: 'rose'}); setSuggestedUsername(username + Math.floor(Math.random() * 100)); } 
                        else { setUsernameStatus({msg: 'ইউজারনেমটি পাওয়া যাচ্ছে', color: 'emerald'}); setSuggestedUsername(''); }
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [username]);

            const handleSignup = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                try {
                    const uSnapshot = await db.collection('users').where('username', '==', username).get();
                    const eSnapshot = await db.collection('users').where('email', '==', email).get();
                    if(!uSnapshot.empty || !eSnapshot.empty) throw new Error("ইউজারনেম বা ইমেইল আগে থেকেই ব্যবহৃত হচ্ছে!");
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(userCredential.user.uid).set({ username, email, mobile, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                } catch (err) { setError(err.message); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-0 -right-20 w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="absolute bottom-0 -left-20 w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-emerald-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">অ্যাকাউন্ট তৈরি করুন</h2>
                            <p className="text-slate-500 mt-1">চাষ ও ভূমির হিসাব শুরু করুন</p>
                        </div>
                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}
                        <form onSubmit={handleSignup} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ইউজারনেম</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} required className={`w-full px-4 py-2.5 bg-slate-50 border rounded-lg focus:outline-none focus:ring-2 focus:border-transparent transition ${usernameStatus.color === 'rose' ? 'border-rose-400 focus:ring-rose-500' : 'border-slate-300 focus:ring-indigo-500'}`} placeholder="আপনার নাম বা ইউজারনেম" />
                                {usernameStatus.msg && <p className={`text-xs mt-1 font-medium text-${usernameStatus.color}-600`}>{usernameStatus.msg}</p>}
                                {suggestedUsername && <p className="text-xs mt-1 text-slate-500">সাজেশন: <span className="text-indigo-600 cursor-pointer hover:underline" onClick={() => setUsername(suggestedUsername)}>{suggestedUsername}</span></p>}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">ইমেইল</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="email@example.com" /></div>
                                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">মোবাইল</label><input type="tel" value={mobile} onChange={(e) => setMobile(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="01XXXXXXXXX" /></div>
                            </div>
                            <div><label className="block text-sm font-medium text-slate-700 mb-1.5">পাসওয়ার্ড</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="••••••••" /></div>
                            <button type="submit" disabled={loading || usernameStatus.color === 'rose'} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition mt-2 ${loading || usernameStatus.color === 'rose' ? 'bg-slate-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'সাইন আপ সম্পন্ন করুন'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6">ইতিমধ্যে অ্যাকাউন্ট আছে? {' '}<button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">লগ ইন করুন</button></p>
                    </div>
                </div>
            );
        };

        const ForgotPassword = ({ setAuthMode }) => {
            const [email, setEmail] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [error, setError] = useState('');

            const handleReset = async (e) => {
                e.preventDefault(); setLoading(true); setError(''); setMessage('');
                try { await auth.sendPasswordResetEmail(email); setMessage("পাসওয়ার্ড রিসেট লিংক আপনার ইমেইলে পাঠানো হয়েছে। ইনবক্স চেক করুন।"); } 
                catch (err) { setError("এই ইমেইল দিয়ে কোনো অ্যাকাউন্ট নেই।"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="inline-block p-3 bg-amber-50 rounded-full mb-4">
                                <svg className="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                            </div>
                            <h2 className="text-3xl font-bold text-slate-800">পাসওয়ার্ড ভুলে গেছেন?</h2>
                            <p className="text-slate-500 mt-1">আপনার ইমেইল দিন, আমরা রিসেট লিংক পাঠাবো</p>
                        </div>
                        {message && <div className="bg-emerald-50 border border-emerald-200 text-emerald-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{message}</div>}
                        {error && <div className="bg-rose-50 border border-rose-200 text-rose-600 p-3 rounded-lg mb-4 text-center text-sm font-medium">{error}</div>}
                        <form onSubmit={handleReset} className="space-y-5">
                            <div><label className="block text-sm font-medium text-slate-700 mb-1.5">নিবন্ধিত ইমেইল</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" placeholder="example@email.com" /></div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg text-white font-semibold flex justify-center items-center transition ${loading ? 'bg-amber-400 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600 shadow-md hover:shadow-lg'}`}>
                                {loading ? <span className="btn-spinner mr-2"></span> : 'রিসেট লিংক পাঠান'}
                            </button>
                        </form>
                        <p className="text-center text-sm text-slate-500 mt-6">পাসওয়ার্ড মনে পড়ে গেছে? {' '}<button onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600 hover:text-indigo-800 transition">লগ ইন পেজে ফিরে যান</button></p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. DASHBOARD & FARMER MANAGEMENT
        // ==========================================
        const Dashboard = ({ user, handleLogout }) => {
            const [farmers, setFarmers] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedFarmer, setSelectedFarmer] = useState(null);
            
            // Add Farmer States
            const [formData, setFormData] = useState({ name: 'মোস্ত', landAmount: 33, startMonth: 'জানুয়ারি', startYear: 2026, rate: 18000, advance: 10000 });

            useEffect(() => {
                const unsubscribe = db.collection('farmers').where('ownerId', '==', user.uid).onSnapshot(snapshot => {
                    setFarmers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [user]);

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const addFarmer = async (e) => {
                e.preventDefault();
                const total = Number(formData.landAmount) * Number(formData.rate);
                const newFarmer = {
                    ownerId: user.uid,
                    name: formData.name,
                    landAmount: Number(formData.landAmount),
                    startMonth: formData.startMonth,
                    startYear: Number(formData.startYear),
                    records: [{ year: Number(formData.startYear), rate: Number(formData.rate), total, paid: Number(formData.advance), remaining: total - Number(formData.advance) }]
                };
                await db.collection('farmers').add(newFarmer);
                setShowAddForm(false);
            };

            const deleteFarmer = async (id, name) => {
                if(window.confirm(`আপনি কি "${name}" এর সকল হিসাব মুছে ফেলতে চান?`)) {
                    await db.collection('farmers').doc(id).delete();
                    setSelectedFarmer(null);
                }
            };

            const addNewYear = async (farmer) => {
                const lastRecord = farmer.records[farmer.records.length - 1];
                const newYear = lastRecord.year + 1;
                const newRate = prompt(`${newYear} সালের জন্য নতুন দর (প্রতি শতাংশ) কত হবে?`, lastRecord.rate);
                if(newRate && !isNaN(newRate)) {
                    const total = farmer.landAmount * Number(newRate);
                    const newRecords = [...farmer.records, { year: newYear, rate: Number(newRate), total, paid: 0, remaining: total }];
                    await db.collection('farmers').doc(farmer.id).update({ records: newRecords });
                    setSelectedFarmer({...farmer, records: newRecords}); // Update modal state
                }
            };

            const handlePayment = async (farmer, amount) => {
                let remainingPayment = Number(amount);
                const newRecords = farmer.records.map(r => ({...r})).sort((a,b) => a.year - b.year);
                
                for(let rec of newRecords) {
                    if(remainingPayment <= 0) break;
                    if(rec.remaining > 0) {
                        const pay = Math.min(remainingPayment, rec.remaining);
                        rec.paid += pay;
                        rec.remaining -= pay;
                        remainingPayment -= pay;
                    }
                }
                await db.collection('farmers').doc(farmer.id).update({ records: newRecords });
                setSelectedFarmer({...farmer, records: newRecords}); // Update modal state
            };

            // Export to Excel
            const exportToExcel = (farmer) => {
                const ws = XLSX.utils.json_to_sheet(farmer.records.map(r => ({
                    "সাল": r.year, "দর (প্রতি শতাংশ)": r.rate, "মোট দেনদার": r.total, "জমা": r.paid, "বকেয়া": r.remaining
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "হিসাব");
                XLSX.writeFile(wb, `${farmer.name}_হিসাব_${new Date().getFullYear()}.xlsx`);
            };

            // Export to PDF
            const exportToPDF = (farmer) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(18);
                doc.text("Land Management Report", 14, 15);
                doc.setFontSize(12);
                doc.text(`Farmer Name: ${farmer.name}`, 14, 25);
                doc.text(`Land Amount: ${farmer.landAmount} Shotangsho`, 14, 32);
                doc.text(`Start Date: ${farmer.startMonth}, ${farmer.startYear}`, 14, 39);

                doc.autoTable({
                    startY: 45,
                    head: [['Year', 'Rate', 'Total Due', 'Paid', 'Remaining']],
                    body: farmer.records.map(r => [r.year, `${r.rate} Tk`, `${r.total} Tk`, `${r.paid} Tk`, `${r.remaining} Tk`]),
                    theme: 'striped',
                    headStyles: { fillColor: [49, 46, 129] } // Indigo color
                });

                doc.save(`${farmer.name}_হিসাব_${new Date().getFullYear()}.pdf`);
            };

            // Summary Calculation
            const totalPaid = farmers.reduce((acc, f) => acc + f.records.reduce((a, r) => a + r.paid, 0), 0);
            const totalDue = farmers.reduce((acc, f) => acc + f.records.reduce((a, r) => a + r.remaining, 0), 0);

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-slate-900 text-white shadow-lg sticky top-0 z-40">
                        <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                                <h1 className="text-xl md:text-2xl font-bold">ভূমি ব্যবস্থাপনা সিস্টেম</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button onClick={handleLogout} className="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-lg font-semibold transition flex items-center space-x-2 text-sm">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                    <span>লগ আউট</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="container mx-auto p-4 md:p-8 flex-grow w-full">
                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-indigo-500 flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm font-medium">মোট চাষী</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-1">{farmers.length} জন</h3>
                                </div>
                                <div className="p-3 bg-indigo-50 rounded-full">
                                    <svg className="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-emerald-500 flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm font-medium">মোট জমা (সকল বছর)</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-1">{totalPaid.toLocaleString()} ৳</h3>
                                </div>
                                <div className="p-3 bg-emerald-50 rounded-full">
                                    <svg className="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-rose-500 flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm font-medium">মোট বকেয়া (সকল বছর)</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-1">{totalDue.toLocaleString()} ৳</h3>
                                </div>
                                <div className="p-3 bg-rose-50 rounded-full">
                                    <svg className="w-8 h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                </div>
                            </div>
                        </div>

                        {/* Farmer List Section */}
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">চাষীদের তালিকা</h2>
                            <button onClick={() => setShowAddForm(!showAddForm)} className={`px-5 py-2.5 rounded-lg font-semibold transition flex items-center space-x-2 text-white ${showAddForm ? 'bg-slate-500 hover:bg-slate-600' : 'bg-indigo-600 hover:bg-indigo-700 shadow-md'}`}>
                                {showAddForm ? 'বাতিল করুন' : 'নতুন চাষী যোগ করুন'}
                            </button>
                        </div>

                        {showAddForm && (
                            <form onSubmit={addFarmer} className="bg-white p-6 rounded-xl shadow-lg mb-8 border border-slate-200">
                                <h3 className="text-lg font-semibold text-slate-700 mb-4 border-b pb-2">নতুন চাষীর তথ্য</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">চাষীর নাম</label><input type="text" name="name" value={formData.name} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">জমির পরিমাণ (শতাংশ)</label><input type="number" name="landAmount" value={formData.landAmount} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">চাষ শুরুর মাস</label><select name="startMonth" value={formData.startMonth} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white"><option>জানুয়ারি</option><option>ফেব্রুয়ারি</option><option>মার্চ</option><option>এপ্রিল</option><option>মে</option><option>জুন</option></select></div>
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">চাষ শুরুর সাল</label><input type="number" name="startYear" value={formData.startYear} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">দর (প্রতি শতাংশ)</label><input type="number" name="rate" value={formData.rate} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-600 mb-1">অগ্রিম জমা</label><input type="number" name="advance" value={formData.advance} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required /></div>
                                </div>
                                <button type="submit" className="mt-6 w-full md:w-auto bg-emerald-600 text-white px-8 py-2.5 rounded-lg hover:bg-emerald-700 font-semibold shadow-sm transition">চাষী সেভ করুন</button>
                            </form>
                        )}

                        {/* Farmers Table */}
                        <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="min-w-full text-center border-collapse">
                                    <thead>
                                        <tr className="bg-slate-800 text-white">
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">চাষীর নাম</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">জমি (শতাংশ)</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">মোট জমা</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">মোট বকেয়া</th>
                                            <th className="p-4 border border-slate-700 text-sm font-semibold">অ্যাকশন</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {farmers.map(farmer => {
                                            const fTotalPaid = farmer.records.reduce((a, r) => a + r.paid, 0);
                                            const fTotalDue = farmer.records.reduce((a, r) => a + r.remaining, 0);
                                            return (
                                                <tr key={farmer.id} className="border-b border-slate-200 hover:bg-slate-50 transition">
                                                    <td className="p-4 border border-slate-200 font-medium text-slate-800">{farmer.name}</td>
                                                    <td className="p-4 border border-slate-200 text-slate-600">{farmer.landAmount}</td>
                                                    <td className="p-4 border border-slate-200 text-emerald-600 font-semibold">{fTotalPaid.toLocaleString()} ৳</td>
                                                    <td className="p-4 border border-slate-200 text-rose-600 font-bold">{fTotalDue.toLocaleString()} ৳</td>
                                                    <td className="p-4 border border-slate-200">
                                                        <div className="flex items-center justify-center space-x-2">
                                                            <button onClick={() => setSelectedFarmer(farmer)} className="bg-indigo-100 text-indigo-700 p-2 rounded-lg hover:bg-indigo-200 transition" title="বিস্তারিত দেখুন">
                                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                                            </button>
                                                            <button onClick={() => exportToExcel(farmer)} className="bg-emerald-100 text-emerald-700 p-2 rounded-lg hover:bg-emerald-200 transition" title="Excel ডাউনলোড করুন">
                                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                                            </button>
                                                            <button onClick={() => exportToPDF(farmer)} className="bg-rose-100 text-rose-700 p-2 rounded-lg hover:bg-rose-200 transition" title="PDF ডাউনলোড করুন">
                                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                                                            </button>
                                                            <button onClick={() => deleteFarmer(farmer.id, farmer.name)} className="bg-slate-100 text-slate-700 p-2 rounded-lg hover:bg-rose-500 hover:text-white transition" title="ডিলিট করুন">
                                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            {farmers.length === 0 && (
                                <div className="p-10 text-center text-slate-400">
                                    <svg className="w-16 h-16 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                    এখনও কোন চাষী যোগ করা হয়নি।
                                </div>
                            )}
                        </div>
                    </main>
                    
                    <footer className="bg-slate-800 text-slate-400 text-center p-4 text-sm mt-auto">
                        &copy; {new Date().getFullYear()} ভূমি ব্যবস্থাপনা সিস্টেম। সর্বস্বত্ব সংরক্ষিত।
                    </footer>

                    {/* Farmer Details Modal */}
                    {selectedFarmer && (
                        <FarmerDetailsModal 
                            farmer={selectedFarmer} 
                            onClose={() => setSelectedFarmer(null)} 
                            handlePayment={handlePayment}
                            addNewYear={addNewYear}
                            deleteFarmer={deleteFarmer}
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // 5. FARMER DETAILS MODAL COMPONENT
        // ==========================================
        const FarmerDetailsModal = ({ farmer, onClose, handlePayment, addNewYear, deleteFarmer }) => {
            const [payAmount, setPayAmount] = useState('');
            const fTotalPaid = farmer.records.reduce((a, r) => a + r.paid, 0);
            const fTotalDue = farmer.records.reduce((a, r) => a + r.remaining, 0);

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4 overflow-y-auto" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl my-8 modal-enter" onClick={e => e.stopPropagation()}>
                        {/* Modal Header */}
                        <div className="bg-slate-800 text-white p-5 rounded-t-2xl flex justify-between items-center">
                            <div>
                                <h3 className="text-2xl font-bold">{farmer.name} এর বিস্তারিত হিসাব</h3>
                                <p className="text-slate-300 text-sm mt-1">জমি: {farmer.landAmount} শতাংশ | শুরু: {farmer.startMonth}, {farmer.startYear}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-white transition">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>

                        {/* Modal Body */}
                        <div className="p-6">
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="bg-emerald-50 p-4 rounded-lg text-center">
                                    <p className="text-sm text-emerald-700 font-medium">মোট জমা</p>
                                    <h4 className="text-2xl font-bold text-emerald-800 mt-1">{fTotalPaid.toLocaleString()} ৳</h4>
                                </div>
                                <div className="bg-rose-50 p-4 rounded-lg text-center">
                                    <p className="text-sm text-rose-700 font-medium">মোট বকেয়া</p>
                                    <h4 className="text-2xl font-bold text-rose-800 mt-1">{fTotalDue.toLocaleString()} ৳</h4>
                                </div>
                            </div>

                            {/* Records Table */}
                            <div className="overflow-x-auto mb-6 border border-slate-200 rounded-lg">
                                <table className="min-w-full text-center">
                                    <thead className="bg-slate-100">
                                        <tr>
                                            <th className="p-3 border-b text-sm font-semibold text-slate-700">সাল</th>
                                            <th className="p-3 border-b text-sm font-semibold text-slate-700">দর</th>
                                            <th className="p-3 border-b text-sm font-semibold text-slate-700">মোট</th>
                                            <th className="p-3 border-b text-sm font-semibold text-slate-700">জমা</th>
                                            <th className="p-3 border-b text-sm font-semibold text-slate-700">বকেয়া</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {farmer.records.map((rec, index) => (
                                            <tr key={index} className="hover:bg-slate-50">
                                                <td className="p-3 border-b text-sm">{rec.year}</td>
                                                <td className="p-3 border-b text-sm">{rec.rate.toLocaleString()} ৳</td>
                                                <td className="p-3 border-b text-sm">{rec.total.toLocaleString()} ৳</td>
                                                <td className="p-3 border-b text-sm text-emerald-600 font-medium">{rec.paid.toLocaleString()} ৳</td>
                                                <td className="p-3 border-b text-sm text-rose-600 font-bold">{rec.remaining.toLocaleString()} ৳</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Payment Action */}
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-4">
                                <label className="block text-sm font-medium text-slate-700 mb-2">নতুন কিস্তি জমা দিন (পুরোনো বকেয়া থাকলে প্রথমে তা কাটা পড়বে)</label>
                                <div className="flex space-x-2">
                                    <input type="number" value={payAmount} onChange={e => setPayAmount(e.target.value)} placeholder="টাকার পরিমাণ" className="flex-1 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                                    <button onClick={() => { if(payAmount > 0) { handlePayment(farmer, payAmount); setPayAmount(''); } }} className="bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition">জমা করুন</button>
                                </div>
                            </div>

                            {/* Other Actions */}
                            <div className="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-2">
                                <button onClick={() => addNewYear(farmer)} className="flex-1 bg-slate-700 text-white py-2.5 rounded-lg font-semibold hover:bg-slate-800 transition flex items-center justify-center space-x-2">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>
                                    <span>নতুন সালের হিসাব যোগ করুন</span>
                                </button>
                                <button onClick={() => deleteFarmer(farmer.id, farmer.name)} className="flex-1 bg-rose-100 text-rose-700 py-2.5 rounded-lg font-semibold hover:bg-rose-200 transition flex items-center justify-center space-x-2">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    <span>চাষী ডিলিট করুন</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(user => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                setUser(null);
                setAuthMode('login');
                window.location.reload(); 
            };

            if (loading) return <ColorfulSpinner />;

            if (user) return <Dashboard user={user} handleLogout={handleLogout} />;

            return (
                <>
                    {authMode === 'login' && <Login setAuthMode={setAuthMode} />}
                    {authMode === 'signup' && <Signup setAuthMode={setAuthMode} />}
                    {authMode === 'forgot' && <ForgotPassword setAuthMode={setAuthMode} />}
                </>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
